# Databricks Jobs Configuration - Outbound Push (Delta → BeProduct)
#
# Deploy with: databricks jobs configure --json-file push_jobs.json
# Or use Databricks Terraform Provider for IaC
#
# Schedule: ON-DEMAND ONLY (no automatic triggers)
# Use Databricks UI or API to trigger manually when you want to push changes back to BeProduct
#
# IMPORTANT: These jobs have conflict_strategy="local_wins" which means Databricks version
#            will overwrite BeProduct version if there's a conflict. Use with caution.

jobs:
  - name: "beproduct-push-styles"
    description: "Push Modified Styles from Databricks back to BeProduct (on-demand)"
    max_concurrent_runs: 1
    tasks:
      - task_key: "push_styles"
        notebook_task:
          notebook_path: "/Workspace/beproduct/notebooks/outbound/01_push_styles"
          base_parameters:
            dry_run: "true"  # Default to dry-run for safety
            target_catalog: "main"
            target_schema: "beproduct"
        new_cluster:
          spark_version: "14.3.x-scala2.12"
          node_type_id: "i3.xlarge"
          num_workers: 1
        timeout_seconds: 3600
        max_retries: 0


# Databricks Jobs Configuration - Inbound Sync (BeProduct → Delta)
# 
# Deploy with: databricks jobs configure --json-file sync_jobs.json
# Or use Databricks Terraform Provider for IaC
#
# Schedule: All jobs run every 6 hours, staggered by 30 min to avoid API thundering herd
# Times: 00:00, 06:00, 12:00, 18:00 UTC

jobs:
  - name: "beproduct-sync-styles"
    description: "Sync Styles from BeProduct to Databricks Delta"
    schedule:
      quartz_cron_expression: "0 0 0,6,12,18 * * ?"  # 00:00 UTC
      timezone_id: "UTC"
    max_concurrent_runs: 1
    tasks:
      - task_key: "sync_styles"
        notebook_task:
          notebook_path: "/Workspace/beproduct/notebooks/inbound/01_sync_styles"
          base_parameters:
            incremental_mode: "true"
            target_catalog: "main"
            target_schema: "beproduct"
            batch_size: "1000"
        new_cluster:
          spark_version: "14.3.x-scala2.12"
          node_type_id: "i3.xlarge"
          num_workers: 2
        timeout_seconds: 3600
        max_retries: 1
        retry_on_timeout: false

  - name: "beproduct-sync-materials"
